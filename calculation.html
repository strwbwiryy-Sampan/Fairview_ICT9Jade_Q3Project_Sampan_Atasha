<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateRunner Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        footer {
        background-color: #777;
        padding: 10px;
        text-align: center;
        color: white;
    }

        .nav-item {
        color: white;
        cursor: pointer;
        padding: 8px 7px;
    }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <main class="flex-grow-1">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand"><img src="logo.png" alt="Image" class="rounded-circle" style="height: 40px;"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mynavbar">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item" onclick="window.location.href='index.html';">Home</li>
                        <li class="nav-item"><a class="nav-link" href="#">Calculator</a></li>
                        <li class="nav-item" onclick="window.location.href='Registtration.html';">Log In</li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="d-flex justify-content-center align-items-center min-vh-100" style="background-color:#d2ebf9;">
            <article class="p-4 shadow rounded text-center" style="max-width:500px; background-color: #43abff; font-family: Helvetica;">
                <h1>Calculator</h1>

                <form id="fareForm" onsubmit="calculateFare(event)">
                    <label for="pickup">Pick-up Station:</label>
                    <select id="pickup" class="form-select mb-2">
                        <option value="0.0">North Avenue</option>
                        <option value="1.0">Quezon Avenue</option>
                        <option value="2.8">GMA Kamuning</option>
                        <option value="4.1">Araneta Center-Cubao</option>
                        <option value="5.7">Santolan-Annapolis</option>
                        <option value="7.1">Ortigas</option>
                        <option value="8.1">Shaw Boulevard</option>
                        <option value="9.0">Boni</option>
                        <option value="10.5">Guadalupe</option>
                        <option value="11.3">Buendia</option>
                        <option value="12.3">Ayala</option>
                        <option value="13.9">Magallanes</option>
                        <option value="16.9">Taft Avenue</option>
                    </select>

                    <label for="dropoff">Drop-off Station:</label>
                    <select id="dropoff" class="form-select mb-2">
                        <option value="0.0">North Avenue</option>
                        <option value="1.0">Quezon Avenue</option>
                        <option value="2.8">GMA Kamuning</option>
                        <option value="4.1">Araneta Center-Cubao</option>
                        <option value="5.7">Santolan-Annapolis</option>
                        <option value="7.1">Ortigas</option>
                        <option value="8.1">Shaw Boulevard</option>
                        <option value="9.0">Boni</option>
                        <option value="10.5">Guadalupe</option>
                        <option value="11.3">Buendia</option>
                        <option value="12.3">Ayala</option>
                        <option value="13.9">Magallanes</option>
                        <option value="16.9">Taft Avenue</option>
                    </select>

                    <div class="mt-3">
                        <label>
                            <input type="checkbox" id="disc"> Senior/PWD/Student Discount (20%)
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary mt-3">Calculate Fare</button>
                </form>

                <p id="result" class="mt-3 fw-bold"></p>

                <details ontoggle="message1()">
                    <summary><u>Instructions</u></summary>
                    <br>
                    <i id="message"></i>
                </details>
            </article>
        </div>
    </main>

    <footer class="mt-auto">
        <p>Arada, Sampan, Oquendo | 9-Jade</p>
    </footer>

    <script>
        function message1() {
            document.getElementById("message").innerHTML = "Select your pick-up and drop-off stations to calculate the fare.";
        }

        function calculateFare(event) {
            event.preventDefault();
            
            let pickup = parseFloat(document.getElementById("pickup").value);
            let dropoff = parseFloat(document.getElementById("dropoff").value);
            let isDiscounted = document.getElementById("disc").checked;
            
            let basefare = 50;
            let perKMrate = 15;
            let baseKM = 2;
            
            // Calculate distance
            let distance = Math.abs(dropoff - pickup);

            let fare = (distance === 0) ? 0 : (basefare + Math.max(distance - baseKM, 0) * perKMrate);
            fare = fare * (1 - (0.2 * isDiscounted));

            document.getElementById("result").innerHTML = "Total Fare: ₱" + fare.toFixed(2);
        }
    </script>
</body>
</html>
